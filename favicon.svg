<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9844A"/>
      <stop offset="100%" stop-color="#A0602A"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF9F4"/>
      <stop offset="100%" stop-color="#EDE5DC"/>
    </linearGradient>
    <linearGradient id="polish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4895A"/>
      <stop offset="100%" stop-color="#8A4520"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="bottleClip">
      <rect x="15" y="24" width="26" height="33" rx="5"/>
    </clipPath>
  </defs>

  <!-- Background tile -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Cap -->
  <rect x="22" y="8" width="12" height="10" rx="3" fill="url(#bottle)"/>
  <!-- Cap inner shadow line -->
  <rect x="22" y="16" width="12" height="1.5" fill="#C07840" opacity="0.25"/>

  <!-- Neck -->
  <rect x="25" y="18" width="6" height="7" rx="1" fill="#EDE5DC"/>

  <!-- Bottle body -->
  <rect x="15" y="24" width="26" height="33" rx="5" fill="url(#bottle)"/>

  <!-- Polish fill -->
  <rect x="15" y="38" width="26" height="19" rx="0" fill="url(#polish)" clip-path="url(#bottleClip)"/>
  <!-- Polish surface highlight -->
  <ellipse cx="28" cy="38.5" rx="11" ry="2" fill="#E8A07A" opacity="0.6"/>

  <!-- Bottle left edge highlight -->
  <rect x="15" y="26" width="3.5" height="27" rx="3" fill="url(#shine)" opacity="0.7"/>

  <!-- Bottom rounded cap on clip -->
  <rect x="15" y="52" width="26" height="5" rx="5" fill="#7A3A14" opacity="0.18" clip-path="url(#bottleClip)"/>
</svg>
